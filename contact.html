<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CIVIL PORTFOLIO - ติดต่อ</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap');

        :root {
            --accent: #f97316;
            --accent-soft: rgba(249, 115, 22, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Sarabun', sans-serif;
        }

        body {
            background-color: #0d1527;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            position: relative;
        }

        /* --- Canvas พื้นหลังเคลื่อนไหว --- */
        .bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        /* --- แถบเมนูด้านบน --- */
        header {
            background-color: rgba(11, 17, 32, 0.9);
            backdrop-filter: blur(10px);
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(30, 41, 59, 0.5);
            z-index: 10;
        }

        .logo {
            font-weight: 700;
            font-size: 1.2rem;
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo span {
            color: var(--accent);
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 24px;
        }

        nav a {
            color: #94a3b8;
            text-decoration: none;
            font-size: 0.95rem;
            transition: color 0.3s;
        }

        nav a:hover, nav a.active {
            color: var(--accent);
        }

        /* --- คอนเทนเนอร์หลัก --- */
        .contact-container {
            max-width: 650px;
            width: 100%;
            margin: 40px auto 0 auto;
            padding: 0 20px 40px 20px;
            z-index: 5;
            display: flex;
            flex-direction: column;
            flex-grow: 1; /* ดันเนื้อหาและปุ่มนำทาง */
        }

        /* --- สไตล์หัวข้อ --- */
        .page-header {
            text-align: left;
            margin-bottom: 35px;
            display: flex;
            align-items: center;
        }

        .page-header-decor {
            width: 6px;
            height: 40px;
            background-color: var(--accent);
            margin-right: 18px;
            border-radius: 4px;
            box-shadow: 0 0 8px rgba(249, 115, 22, 0.6);
        }

        .page-header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            color: #ffffff;
            line-height: 1.1;
        }

        /* --- กลุ่มของการ์ดข้อมูลติดต่อ --- */
        .contact-cards-group {
            display: flex;
            flex-direction: column;
            gap: 18px;
            margin-bottom: 30px;
        }

        .contact-card {
            display: flex;
            align-items: center;
            width: 100%;
            padding: 16px 24px;
            background: rgba(17, 26, 46, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(249, 115, 22, 0.25);
            border-radius: 12px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2), inset 0 1px 1px rgba(255, 255, 255, 0.05);
            text-decoration: none;
            color: #e2e8f0;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        a.contact-card {
            cursor: pointer;
        }

        .contact-card:hover {
            transform: translateY(-4px);
            border-color: rgba(249, 115, 22, 1);
            box-shadow: 0 10px 20px rgba(249, 115, 22, 0.15), 0 4px 6px rgba(0, 0, 0, 0.2);
            background: rgba(22, 34, 63, 0.7);
        }

        .card-icon-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            background-color: rgba(30, 41, 59, 0.7);
            border-radius: 50%;
            fill: var(--accent);
            margin-right: 20px;
            flex-shrink: 0;
            transition: all 0.3s;
        }

        .contact-card:hover .card-icon-wrapper {
            background-color: var(--accent);
            fill: #0d1527;
        }

        .card-content {
            display: flex;
            flex-direction: column;
            text-align: left;
        }

        .card-label {
            font-size: 0.8rem;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 2px;
        }

        .card-value {
            font-size: 1.05rem;
            font-weight: 600;
            color: #ffffff;
            transition: color 0.3s;
        }

        .contact-card:hover .card-value {
            color: var(--accent);
        }

        /* --- ปรับปรุงใหม่: สไตล์แถบปุ่มควบคุมนำทางด้านล่าง (ตามรูปภาพ) --- */
        .btn-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-top: auto; /* ดันกลุ่มปุ่มลงด้านล่างสุด */
            padding-top: 35px;
            border-top: 1px solid rgba(255, 255, 255, 0.08); /* เส้นกั้นบางๆ ด้านบนปุ่ม */
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 28px;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.25s ease-in-out;
            cursor: pointer;
            min-width: 135px;
        }

        /* ปุ่มย้อนกลับ: ขอบบางมนๆ พื้นหลังใส */
        .btn-secondary {
            color: #ffffff;
            border: 1px solid rgba(148, 163, 184, 0.2);
            background-color: rgba(30, 41, 59, 0.15);
        }

        .btn-secondary:hover {
            border-color: rgba(148, 163, 184, 0.5);
            background-color: rgba(255, 255, 255, 0.05);
            transform: translateY(-2px);
        }

        /* ปุ่มถัดไป: สีส้มสดเรืองแสงตามต้นแบบรูป */
        .btn-primary {
            background-color: #ff6b15; /* สีส้มสด */
            color: #ffffff;
            border: 1px solid #ff6b15;
            box-shadow: 0 4px 15px rgba(255, 107, 21, 0.35); /* เพิ่มเงาเรืองแสงสีส้ม */

            border-color: #ff7d30;
            transform: translateY(-2px);
            box-shadow: 0 6px 22px rgba(255, 107, 21, 0.55);

        /* จอมือถือ */

            header {

                padding: 15px 20px;
            }

                font-size: 1.8rem;
            }
            .page-header-decor {
                height: 32px;
                margin-right: 12px;

            .btn-group {

                padding-top: 25px;
            }
            .btn {
                flex: 1;
                padding: 10px 16px;
                font-size: 0.9rem;
                min-width: auto;
            }
        }

    <!-- --- JS Script อนิเมชันพื้นหลังวิศวกรรมโยธา --- -->
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });

        // สร้าง Nodes
        const nodes = [];
        const numNodes = 18;
        for (let i = 0; i < numNodes; i++) {
            nodes.push({
                x: Math.random() * width,
                y: Math.random() * height,
                vx: (Math.random() - 0.5) * 0.4,
                vy: (Math.random() - 0.5) * 0.4,
                radius: Math.random() * 2 + 2
            });
        }

        // เฟือง
        const gears = [
            { x: 100, y: 200, radius: 60, teeth: 12, speed: 0.005, color: 'rgba(249, 115, 22, 0.08)' },
            { x: 196, y: 200, radius: 40, teeth: 8, speed: -0.0075, color: 'rgba(30, 41, 59, 0.25)', strokeColor: 'rgba(249, 115, 22, 0.1)' },
            { x: width - 150, y: height - 150, radius: 90, teeth: 18, speed: 0.003, color: 'rgba(249, 115, 22, 0.05)' }
        ];

        let angleOffset = 0;

        function drawGear(gear) {
            ctx.save();
            ctx.translate(gear.x, gear.y);
            ctx.rotate(angleOffset * (gear.speed / 0.005));
            ctx.fillStyle = gear.color;
            ctx.strokeStyle = gear.strokeColor || 'rgba(249, 115, 22, 0.05)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(0, 0, gear.radius - 12, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();

            for (let i = 0; i < gear.teeth; i++) {
                ctx.rotate((Math.PI * 2) / gear.teeth);
                ctx.beginPath();
                ctx.rect(-8, -gear.radius, 16, 20);
                ctx.fill();
                ctx.stroke();
            }

            ctx.globalCompositeOperation = 'destination-out';
            ctx.beginPath();
            ctx.arc(0, 0, gear.radius * 0.35, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalCompositeOperation = 'source-over';
            ctx.beginPath();
            ctx.arc(0, 0, gear.radius * 0.35, 0, Math.PI * 2);
            ctx.stroke();
            ctx.restore();
        }

        function drawTrussBeam(p1, p2) {
            const dist = Math.hypot(p1.x - p2.x, p1.y - p2.y);
            if (dist < 250) {
                ctx.strokeStyle = `rgba(249, 115, 22, ${0.15 * (1 - dist / 250)})`;
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.moveTo(p1.x, p1.y);
                ctx.lineTo(p2.x, p2.y);
                ctx.stroke();
            }
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);

            // วาดเส้น Grid สีกรมท่า/ส้มจางๆ
            ctx.strokeStyle = 'rgba(249, 115, 22, 0.035)';
            ctx.lineWidth = 1;
            const gridSize = 45;
            for(let x = 0; x < width; x += gridSize) {
                ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, height); ctx.stroke();
            }
            for(let y = 0; y < height; y += gridSize) {
                ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(width, y); ctx.stroke();
            }

            // หมุนเฟือง
            gears.forEach(drawGear);
            angleOffset += 0.01;

            // วาด Node และคานถัก
            for (let i = 0; i < nodes.length; i++) {
                const p1 = nodes[i];
                p1.x += p1.vx;
                p1.y += p1.vy;

                if (p1.x < 0 || p1.x > width) p1.vx *= -1;
                if (p1.y < 0 || p1.y > height) p1.vy *= -1;

                ctx.fillStyle = 'rgba(249, 115, 22, 0.4)';
                ctx.beginPath();
                ctx.arc(p1.x, p1.y, p1.radius, 0, Math.PI * 2);
                ctx.fill();

                for (let j = i + 1; j < nodes.length; j++) {
                    drawTrussBeam(p1, nodes[j]);
                }
            }
            requestAnimationFrame(animate);
        }
        animate();
    </script>
