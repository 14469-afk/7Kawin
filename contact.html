    <style>
        :root {
            --primary: #1e293b;
            --secondary: #0f172a;
            --accent: #f97316;
            --accent-soft: rgba(249, 115, 22, 0.15);
            --text-light: #f8fafc;
            --text-muted: #94a3b8;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Sarabun', sans-serif; }
        body { background-color: var(--secondary); color: var(--text-light); overflow-x: hidden; min-height: 100vh; display: flex; flex-direction: column; }
        .bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }
        
        /* --- แถบเมนูด้านบนดึงมาจากหน้าผลงานเกียรติบัตร --- */
        nav {
            background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(249, 115, 22, 0.2);
            padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100;
        }
        .logo { font-family: 'Space Grotesk', sans-serif; font-size: 1.5rem; font-weight: 700; color: var(--text-light); display: flex; align-items: center; gap: 10px; }
        .logo span { color: var(--accent); }
        .nav-links { display: flex; gap: 1.5rem; list-style: none; }
        .nav-links a { color: var(--text-muted); text-decoration: none; font-size: 0.95rem; font-weight: 600; transition: all 0.3s; padding: 0.5rem 1rem; border-radius: 4px; }
        .nav-links a:hover, .nav-links a.active { color: var(--accent); background: var(--accent-soft); }

        /* --- คอนเทนเนอร์หลัก --- */
        .container { flex: 1; max-width: 700px; margin: 2rem auto; width: 100%; padding: 0 1.5rem; z-index: 10; display: flex; flex-direction: column; }
        .section-title { font-size: 2.2rem; margin-bottom: 3rem; border-left: 5px solid var(--accent); padding-left: 15px; font-weight: 700; }

        /* --- การ์ดข้อมูลติดต่อ --- */
        .contact-cards-group { display: flex; flex-direction: column; gap: 1.2rem; margin-bottom: 2.5rem; }
        .contact-card {
            display: flex; align-items: center; width: 100%; padding: 1.2rem 1.5rem; 
            background: rgba(30, 41, 59, 0.65); border: 1px solid rgba(249, 115, 22, 0.25);
            border-radius: 12px; text-decoration: none; color: #e2e8f0; backdrop-filter: blur(5px);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        a.contact-card { cursor: pointer; }
        .contact-card:hover {
            transform: translateY(-4px); border-color: rgba(249, 115, 22, 1);
            box-shadow: 0 10px 20px rgba(249, 115, 22, 0.15); background: rgba(30, 41, 59, 0.85);
        }

        .card-icon-wrapper {
            display: flex; align-items: center; justify-content: center; width: 44px; height: 44px;
            background-color: rgba(15, 23, 42, 0.7); border-radius: 50%; fill: var(--accent); stroke: var(--accent);
            margin-right: 20px; flex-shrink: 0; transition: all 0.3s;
        }
        .contact-card:hover .card-icon-wrapper { background-color: var(--accent); fill: #0f172a; stroke: #0f172a; }

        .card-content { display: flex; flex-direction: column; text-align: left; }
        .card-label { font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 2px; }
        
        /* บังคับไม่ให้เบอร์โทรศัพท์กลายเป็นสีฟ้า */
        .card-value { font-size: 1.05rem; font-weight: 600; color: var(--text-light) !important; transition: color 0.3s; }
        .card-value a { color: inherit !important; text-decoration: none !important; }
        .contact-card:hover .card-value { color: var(--accent) !important; }

        /* --- แถบปุ่มนำทางด้านล่าง --- */
        .nav-btn-container { display: flex; justify-content: space-between; align-items: center; margin-top: auto; padding-top: 2rem; border-top: 1px solid rgba(255,255,255,0.1); }
        .btn { display: inline-flex; align-items: center; gap: 8px; padding: 0.7rem 1.8rem; border-radius: 6px; font-weight: 600; text-decoration: none; transition: all 0.3s; cursor: pointer; }
        .btn-outline { border: 1px solid rgba(255,255,255,0.2); color: var(--text-light); background: rgba(15, 23, 42, 0.4); }
        .btn-outline:hover { background: rgba(255,255,255,0.05); border-color: var(--accent); }
        .btn-primary { background: var(--accent); color: white; border: none; box-shadow: 0 4px 15px rgba(249, 115, 22, 0.35); }
        .btn-primary:hover { background: #ea580c; box-shadow: 0 6px 22px rgba(249, 115, 22, 0.55); }

        @media (max-width: 600px) {
            nav { padding: 1rem; }
            .logo { font-size: 1.2rem; }
            .nav-links { gap: 0.5rem; }
            .nav-links a { padding: 0.4rem 0.6rem; font-size: 0.85rem; }

            .nav-btn-container { gap: 10px; }
            .btn { flex: 1; padding: 0.7rem 1rem; min-width: auto; justify-content: center; }
        }
    </style>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });

        const nodes = [];
        const numNodes = 18;
        for (let i = 0; i < numNodes; i++) {
            nodes.push({
                x: Math.random() * width,
                y: Math.random() * height,
                vx: (Math.random() - 0.5) * 0.4,
                vy: (Math.random() - 0.5) * 0.4,
                radius: Math.random() * 2 + 2
            });
        }

        const gears = [
            { x: 100, y: 200, radius: 60, teeth: 12, speed: 0.005, color: 'rgba(249, 115, 22, 0.08)' },
            { x: 196, y: 200, radius: 40, teeth: 8, speed: -0.0075, color: 'rgba(30, 41, 59, 0.25)', strokeColor: 'rgba(249, 115, 22, 0.1)' },
            { x: width - 150, y: height - 150, radius: 90, teeth: 18, speed: 0.003, color: 'rgba(249, 115, 22, 0.05)' }
        ];

        let angleOffset = 0;

        function drawGear(gear) {
            ctx.save(); ctx.translate(gear.x, gear.y); ctx.rotate(angleOffset * (gear.speed / 0.005));
            ctx.fillStyle = gear.color; ctx.strokeStyle = gear.strokeColor || 'rgba(249, 115, 22, 0.05)'; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.arc(0, 0, gear.radius - 12, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
            for (let i = 0; i < gear.teeth; i++) {
                ctx.rotate((Math.PI * 2) / gear.teeth); ctx.beginPath(); ctx.rect(-8, -gear.radius, 16, 20); ctx.fill(); ctx.stroke();
            }
            ctx.globalCompositeOperation = 'destination-out'; ctx.beginPath(); ctx.arc(0, 0, gear.radius * 0.35, 0, Math.PI * 2); ctx.fill();
            ctx.globalCompositeOperation = 'source-over'; ctx.beginPath(); ctx.arc(0, 0, gear.radius * 0.35, 0, Math.PI * 2); ctx.stroke(); ctx.restore();
        }

        function drawTrussBeam(p1, p2) {
            const dist = Math.hypot(p1.x - p2.x, p1.y - p2.y);
            if (dist < 250) {
                ctx.strokeStyle = `rgba(249, 115, 22, ${0.15 * (1 - dist / 250)})`; ctx.lineWidth = 1.5;
                ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
            }
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            ctx.strokeStyle = 'rgba(249, 115, 22, 0.035)'; ctx.lineWidth = 1;
            const gridSize = 45;
            for(let x = 0; x < width; x += gridSize) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, height); ctx.stroke(); }
            for(let y = 0; y < height; y += gridSize) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(width, y); ctx.stroke(); }
            gears.forEach(drawGear); angleOffset += 0.01;
            for (let i = 0; i < nodes.length; i++) {
                const p1 = nodes[i]; p1.x += p1.vx; p1.y += p1.vy;
                if (p1.x < 0 || p1.x > width) p1.vx *= -1; if (p1.y < 0 || p1.y > height) p1.vy *= -1;
                ctx.fillStyle = 'rgba(249, 115, 22, 0.4)'; ctx.beginPath(); ctx.arc(p1.x, p1.y, p1.radius, 0, Math.PI * 2); ctx.fill();
                for (let j = i + 1; j < nodes.length; j++) { drawTrussBeam(p1, nodes[j]); }
            }
            requestAnimationFrame(animate);
        }
        animate();
    </script>
