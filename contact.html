<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CIVIL PORTFOLIO - ติดต่อ</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Sarabun', sans-serif;
        }

        body {
            background-color: #0d1527;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow-x: hidden;
            position: relative;
        }

        /* --- เอฟเฟกต์พื้นหลังเคลื่อนไหวธีมเดิม --- */
        .bg-animation {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .bg-animation::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background-image: 
                radial-gradient(circle, rgba(249, 115, 22, 0.05) 1px, transparent 1px),
                radial-gradient(circle, rgba(30, 41, 59, 0.5) 2px, transparent 2px);
            background-size: 40px 40px, 80px 80px;
            animation: backgroundMove 30s linear infinite;
        }

        @keyframes backgroundMove {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* --- แถบเมนูด้านบน (Navigation Bar) --- */
        header {
            background-color: rgba(11, 17, 32, 0.9);
            backdrop-filter: blur(10px);
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(30, 41, 59, 0.5);
            z-index: 10;
        }

        .logo {
            font-weight: 700;
            font-size: 1.2rem;
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo span {
            color: #f97316;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 24px;
        }

        nav a {
            color: #94a3b8;
            text-decoration: none;
            font-size: 0.95rem;
            transition: color 0.3s;
        }

        nav a:hover, nav a.active {
            color: #f97316;
        }

        /* --- พื้นที่เนื้อหาข้อมูลติดต่อ --- */
        .contact-container {
            max-width: 550px;
            width: 100%;
            margin: auto;
            padding: 40px 20px;
            z-index: 5;
        }

        .contact-header {
            text-align: center;
            margin-bottom: 35px;
        }

        .contact-header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .contact-header p {
            color: #94a3b8;
            font-size: 0.95rem;
        }

        /* --- การจัดวางกลุ่มของกล่องการ์ดติดต่อ --- */
        .contact-cards-group {
            display: flex;
            flex-direction: column;
            gap: 18px;
            margin-bottom: 40px;
        }

        /* --- สไตล์กล่องข้อความ Glassmorphism แยกแต่ละรายการ --- */
        .contact-card {
            display: flex;
            align-items: center;
            width: 100%;
            padding: 16px 24px;
            background: rgba(17, 26, 46, 0.6); /* น้ำเงินเข้มโปร่งแสง */
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(249, 115, 22, 0.25); /* เส้นขอบสีส้มอ่อนโปร่งแสง */
            border-radius: 12px; /* ขอบโค้งมน */
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2), inset 0 1px 1px rgba(255, 255, 255, 0.05); /* เงานุ่มนวล */
            text-decoration: none;
            color: #e2e8f0;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        /* เมื่อเป็นลิงก์ที่คลิกได้ ให้แสดง Cursor เป็นรูปมือ */
        a.contact-card {
            cursor: pointer;
        }

        /* เอฟเฟกต์ Hover เมื่อเลื่อนเมาส์ผ่าน */
        .contact-card:hover {
            transform: translateY(-4px); /* ยกตัวขึ้นเล็กน้อย */
            border-color: rgba(249, 115, 22, 1); /* เปลี่ยนเส้นขอบเป็นสีส้มชัดเจน */
            box-shadow: 0 10px 20px rgba(249, 115, 22, 0.15), 0 4px 6px rgba(0, 0, 0, 0.2);
            background: rgba(22, 34, 63, 0.7);
        }

        /* --- การจัดวางไอคอน (ซ้าย) และ ข้อความ (ขวา) --- */
        .card-icon-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            background-color: rgba(30, 41, 59, 0.7);
            border-radius: 50%;
            fill: #f97316; /* ไอคอนสีส้ม */
            margin-right: 20px;
            flex-shrink: 0;
            transition: all 0.3s;
        }

        .contact-card:hover .card-icon-wrapper {
            background-color: #f97316;
            fill: #0d1527; /* สลับสีไอคอนตอนชี้ */
        }

        .card-content {
            display: flex;
            flex-direction: column;
            text-align: left;
        }

        .card-label {
            font-size: 0.8rem;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 2px;
        }

        .card-value {
            font-size: 1.05rem;
            font-weight: 600;
            color: #ffffff;
            transition: color 0.3s;
        }

        .contact-card:hover .card-value {
            color: #f97316; /* ข้อความสำคัญเปลี่ยนเป็นสีส้มตอนโฟกัส */
        }

        /* --- ปุ่มควบคุมด้านล่าง --- */
        .btn-group {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 24px;
            border-radius: 30px;
            font-size: 0.95rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s;
            cursor: pointer;
        }

        .btn-secondary {
            color: #e2e8f0;
            border: 1px solid #334155;
            background-color: rgba(15, 23, 42, 0.6);
        }

        .btn-secondary:hover {
            border-color: #f97316;
            color: #f97316;
            transform: translateY(-2px);
        }

        .btn-primary {
            background-color: #f97316;
            color: #0d1527;
            border: 1px solid #f97316;
            box-shadow: 0 4px 14px rgba(249, 115, 22, 0.2);
        }

        .btn-primary:hover {
            background-color: #ea580c;
            border-color: #ea580c;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(249, 115, 22, 0.4);
        }

        /* จอมือถือ */
        @media (max-width: 600px) {
            header {
                flex-direction: column;
                gap: 12px;
                padding: 15px 20px;
            }
            .contact-container {
                padding: 20px 15px;
            }
            .contact-header h1 {
                font-size: 1.8rem;
            }
            .btn-group {
                flex-direction: column;
                gap: 12px;
            }
            .btn {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>

    <!-- พื้นหลังเคลื่อนไหวธีมวิศวกรรมโยธา -->
    <div class="bg-animation"></div>

    <!-- แถบเมนูด้านบน -->
    <header>
        <div class="logo">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#f97316" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/></svg>
            CIVIL <span>PORTFOLIO</span>
        </div>
        <nav>
            <ul>
                <li><a href="index.html">หน้าแรก</a></li>
                <li><a href="profile.html">ประวัติส่วนตัว</a></li>
                <li><a href="education.html">การศึกษา</a></li>
                <li><a href="award.html">ผลงาน/เกียรติบัตร</a></li>
                <li><a href="contact.html" class="active">ติดต่อ</a></li>
            </ul>
        </nav>
    </header>

    <!-- พื้นที่เนื้อหาหลัก -->
    <main class="contact-container">
        
        <div class="contact-header">
            <h1>CONTACT ME</h1>
            <p>ช่องทางการติดต่อและข้อมูลการสื่อสาร</p>
        </div>

        <!-- กลุ่มของกรอบข้อมูลติดต่อแยกชิ้นขนาดเท่ากันหมด -->
        <div class="contact-cards-group">
            
            <!-- เบอร์โทรศัพท์ (div ปกติ คลิกไม่ได้) -->
            <div class="contact-card">
                <div class="card-icon-wrapper">
                    <svg width="18" height="18" viewBox="0 0 24 24"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>
                </div>
                <div class="card-content">
                    <span class="card-label">Telephone</span>
                    <span class="card-value">0xx-xxx-xxxx</span>
                </div>
            </div>

            <!-- ที่อยู่ (div ปกติ คลิกไม่ได้) -->
            <div class="contact-card">
                <div class="card-icon-wrapper">
                    <svg width="18" height="18" viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
                </div>
                <div class="card-content">
                    <span class="card-label">Address</span>
                    <span class="card-value">กรุงเทพมหานคร, ประเทศไทย</span>
                </div>
            </div>

            <!-- Facebook (แท็ก a สำหรับคลิกลิงก์) -->
            <a href="https://facebook.com/yourusername" target="_blank" class="contact-card">
                <div class="card-icon-wrapper">
                    <svg width="18" height="18" viewBox="0 0 24 24"><path d="M19 3a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h14m-.5 15.5v-5.3a3.26 3.26 0 0 0-3.26-3.26c-.85 0-1.84.52-2.32 1.3v-1.11h-2.79v8.37h2.79v-4.93c0-.77.62-1.4 1.39-1.4a1.4 1.4 0 0 1 1.4 1.4v4.93h2.79z"/></svg>
                </div>
                <div class="card-content">
                    <span class="card-label">Facebook</span>
                    <span class="card-value">นายแอนฟิลด์ รักดี</span>
                </div>
            </a>

            <!-- Instagram (แท็ก a สำหรับคลิกลิงก์) -->
            <a href="https://instagram.com/yourusername" target="_blank" class="contact-card">
                <div class="card-icon-wrapper">
                    <svg width="18" height="18" viewBox="0 0 24 24"><path d="M7.8 2h8.4C19.4 2 22 4.6 22 7.8v8.4a5.8 5.8 0 0 1-5.8 5.8H7.8C4.6 22 2 19.4 2 16.2V7.8A5.8 5.8 0 0 1 7.8 2m-.2 2A3.6 3.6 0 0 0 4 7.6v8.8C4 18.39 5.61 20 7.6 20h8.8a3.6 3.6 0 0 0 3.6-3.6V7.6C20 5.61 18.39 4 16.4 4H7.6m4.4 3a5 5 0 0 1 5 5 5 5 0 0 1-5 5 5 5 0 0 1-5-5 5 5 0 0 1 5-5m0 2a3 3 0 0 0-3 3 3 3 0 0 0 3 3 3 3 0 0 0 3-3 3 3 0 0 0-3-3m4.5-1.25a.75.75 0 1 1 0 1.5.75.75 0 0 1 0-1.5z"/></svg>
                </div>
                <div class="card-content">
                    <span class="card-label">Instagram</span>
                    <span class="card-value">@Anfield.rd</span>
                </div>
            </a>

            <!-- LINE (แท็ก a สำหรับคลิกลิงก์) -->
            <a href="https://line.me/ti/p/~yourlineid" target="_blank" class="contact-card">
                <div class="card-icon-wrapper">
                    <svg width="18" height="18" viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-1.99.9-1.99 2L2 22l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM6 9h12v2H6V9zm8 5H6v-2h8v2zm4-6H6V6h12v2z"/></svg>
                </div>
                <div class="card-content">
                    <span class="card-label">LINE</span>
                    <span class="card-value">Connect via LINE</span>
                </div>
            </a>

        </div>

        <!-- ปุ่มควบคุมย้อนกลับและกลับหน้าหลักด้านล่างสุด -->
        <div class="btn-group">
            <a onclick="window.history.back()" class="btn btn-secondary">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                ย้อนกลับ
            </a>
            <a href="index.html" class="btn btn-primary">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                กลับหน้าหลัก
            </a>
        </div>

    </main>

    <footer></footer>

</body>
</html>
